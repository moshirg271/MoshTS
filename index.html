<style>
  :root {
    --bg: #0b0d10;
    --surface: #14171c;
    --surface-hover: #191d23;
    --border: #22262c;
    --text: #f5f6f7;
    --text-muted: #888f99;
    --text-faint: #565c66;
    --accent: #8aa892;
    --accent-dim: rgba(138, 168, 146, 0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 0%, rgba(138, 168, 146, 0.09), transparent 70%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .page {
    width: 100%;
    max-width: 420px;
    opacity: 0;
    animation: rise 0.6s ease forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .page { animation: none; opacity: 1; }
  }

  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.02em;
    margin: 0 auto 22px;
    color: var(--text);
    overflow: hidden;
    box-shadow: 0 0 0 4px var(--accent-dim), 0 0 44px rgba(138, 168, 146, 0.28);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.01em;
    text-align: center;
    margin: 0 0 8px;
  }

  .tagline {
    text-align: center;
    color: var(--text-muted);
    font-size: 14.5px;
    margin: 0 0 32px;
    line-height: 1.5;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 15px 18px;
    font-size: 14.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  }

  .link-icon {
    position: absolute;
    left: 18px;
    width: 18px;
    height: 18px;
    fill: var(--accent);
    opacity: 0.9;
    flex-shrink: 0;
  }

  .link-card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .link-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .link-card:active { transform: translateY(0); }

  .socials {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 36px;
  }

  .socials a {
    color: var(--text-faint);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.08em;
    font-weight: 600;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  .socials a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

</style>

    <div class="socials" id="socials"></div>

    function iconFor(link) {
      const haystack = (link.title + ' ' + link.url).toLowerCase();
      for (const key of Object.keys(ICONS)) {
        if (haystack.includes(key)) return ICONS[key];
      }
      return null;
    }

    const linksEl = document.getElementById('links');
    LINKS.forEach(link => {
      const a = document.createElement('a');
      a.href = link.url;
      a.className = 'link-card';
      a.target = link.url.startsWith('mailto:') ? '_self' : '_blank';
      a.rel = 'noopener noreferrer';

      const path = iconFor(link);
      if (path) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('class', 'link-icon');
        svg.setAttribute('aria-hidden', 'true');
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', path);
        svg.appendChild(p);
        a.appendChild(svg);
      }

      const label = document.createElement('span');
      label.textContent = link.title;
      a.appendChild(label);

      linksEl.appendChild(a);
    });

    const socialsEl = document.getElementById('socials');
    SOCIALS.forEach(s => {
      const a = document.createElement('a');
      a.href = s.url;
      a.textContent = s.label;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';

    });
